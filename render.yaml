databases:
  - name: quizdb
    databaseName: quizdb
    user: quizuser
    plan: free

services:
  - type: web
    name: quiz-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: "chmod +x build.sh && ./build.sh"
    startCommand: "gunicorn core.wsgi:application --workers 2 --threads 4"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: quizdb
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_REGISTER_NO
        value: "admin"
      - key: ADMIN_PASSWORD
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "*"
      - key: CORS_ALLOWED_ORIGINS
        value: "http://localhost:5173" # Update this to include your Vercel URL in Render dashboard after deploying frontend
      - key: PYTHON_VERSION
        value: "3.12.7"
